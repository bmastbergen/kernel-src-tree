name: Kernel Sync

on:
  #schedule:
  #  - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
         include:
           - branch: kernel-mainline
             remote: git://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
             remote_branch: master
#        variant:
#          - kernel-mainline

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VARIANT: ${{ matrix.variant }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync kernel source
        run: |
          set -e
          
          #dnf install -y mock rpm-build rpm-sign mtn-partner golang git
          
          #git clone "https://oauth2:$GITHUB_TOKEN@github.com/ctrliq/kernel-src-tree" kernel
          git clone "https://oauth2:$GITHUB_TOKEN@github.com/bmastbergen/kernel-src-tree" kernel
          git -C kernel config user.name "github-actions[bot]"
          git -C kernel config user.email "github-actions[bot]@users.noreply.github.com"

          git -C kernel remote add upstream ${{ matrix.remote }}
          git -C kernel fetch upstream --tags
          git -C kernel push origin "refs/remotes/upstream/${{ matrix.remote_branch }}:refs/heads/${{ matrix.branch }}"

          #git -C kernel remote add upstream git://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
          #git -C kernel fetch upstream --tags
          #git -C kernel push origin "refs/remotes/upstream/master:refs/heads/${VARIANT}"
          
